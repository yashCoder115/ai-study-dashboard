<!DOCTYPE html>
<html>
<head>
<title>AI Study Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
</head>

<body>

<div class="container">

<div class="theme-toggle">
<label class="switch">
<input type="checkbox" onclick="toggleMode()">
<span class="slider"></span>
</label>
</div>

<h1>AI Study Dashboard</h1>
<p class="tagline">Summarize notes quickly and study smarter</p>
<div class="upload-area" id="uploadArea">
    <p>📄 Drag & Drop PDF or Image</p>
    <span>or click to upload</span>
    <input type="file" id="fileUpload" accept=".pdf,image/*">
</div>
<p id="fileName" class="file-indicator"></p>
<textarea id="inputText" placeholder="Paste your notes here..."></textarea>

<div class="stats">
<span id="wordCount">Words: 0</span>
</div>

<button class="btn" onclick="summarize()">Generate Summary</button>

<div class="output">

<h2>Summary</h2>
<p id="summary">Your summary will appear here...</p>

<button class="copyBtn" onclick="copySummary()">Copy Summary</button>



<script src="script.js"></script>

</body>
</html>
